name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Derive image tags from Dockerfile
        id: tags
        run: |
          version=$(grep -oE 'deluge==[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -n1 | cut -d= -f3)
          if [ -z "$version" ]; then
            echo "Could not parse deluge version from Dockerfile" >&2
            exit 1
          fi
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "version=${version}"               >> "$GITHUB_OUTPUT"
          echo "snapshot=${version}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/deluge:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/deluge:${{ steps.tags.outputs.version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/deluge:${{ steps.tags.outputs.snapshot }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/deluge:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/deluge:${{ steps.tags.outputs.version }}
          docker push ${{ secrets.DOCKER_USERNAME }}/deluge:${{ steps.tags.outputs.snapshot }}